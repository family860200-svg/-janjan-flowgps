<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowGPS 日報 ｜ JANJAN</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF61D2;
    --yellow: #FFE100;
    --cyan: #00F0FF;
    --lime: #B8FF3C;
    --black: #000000;
    --white: #FFFFFF;
    --bg2: #FFB0E0;
    --purple: #CC88FF;
    --shadow: 6px 6px 0 #000;
    --shadow-sm: 3px 3px 0 #000;
    --border: 3px solid #000;
    --radius-pill: 9999px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', 'Montserrat', sans-serif;
    background: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Polka dot background */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(circle 8px at 10% 15%, var(--black) 100%, transparent 0),
      radial-gradient(circle 8px at 25% 80%, var(--black) 100%, transparent 0),
      radial-gradient(circle 8px at 90% 20%, var(--black) 100%, transparent 0),
      radial-gradient(circle 8px at 70% 90%, var(--black) 100%, transparent 0),
      radial-gradient(circle 8px at 50% 50%, var(--black) 100%, transparent 0),
      radial-gradient(circle 5px at 80% 55%, var(--black) 100%, transparent 0),
      radial-gradient(circle 5px at 15% 45%, var(--black) 100%, transparent 0),
      var(--white);
  }

  /* Floating shapes */
  .shape { position: fixed; z-index: -1; border: 3px solid #000; }
  .shape-circle { border-radius: 50%; }
  .s1 { width: 80px; height: 80px; background: var(--cyan); top: 120px; right: 40px; }
  .s2 { width: 50px; height: 50px; background: var(--lime); bottom: 200px; left: 30px; transform: rotate(15deg); }
  .s3 { width: 120px; height: 120px; background: var(--yellow); top: 60%; right: 60px; border-radius: 50%; }

  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="shape s1 shape-circle"></div>
<div class="shape s2"></div>
<div class="shape s3 shape-circle"></div>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── 色彩配置 ──────────────────────────────────────── */

const CARD_COLORS = {
  '🔴 四月主線（工作）': { header: '#FF4444', text: '#fff' },
  '🔴 四月主線':         { header: '#FF4444', text: '#fff' },
  '💰 家庭財務':         { header: '#FFE100', text: '#000' },
  '🟡 健康日常':         { header: '#B8FF3C', text: '#000' },
  '🟠 系統維護':         { header: '#00F0FF', text: '#000' },
  '🔵 支線任務（空檔推進）': { header: '#CC88FF', text: '#000' },
  default:               { header: '#FF61D2', text: '#000' },
};

/* ── 共用元件 ──────────────────────────────────────── */

function Card({ title, icon, headerBg, headerColor, children }) {
  const bg = headerBg || '#f0f0f0';
  const color = headerColor || '#000';
  return (
    <div style={{
      background: '#fff',
      border: '3px solid #000',
      boxShadow: '6px 6px 0 #000',
      overflow: 'hidden',
    }}>
      <div style={{
        background: bg,
        color: color,
        borderBottom: '3px solid #000',
        padding: '14px 20px',
        fontSize: '15px',
        fontWeight: 900,
        display: 'flex',
        alignItems: 'center',
        gap: '8px',
        fontFamily: "'Montserrat', 'Noto Sans TC', sans-serif",
      }}>
        {icon && <span>{icon}</span>}
        {title}
      </div>
      <div style={{ padding: '20px' }}>{children}</div>
    </div>
  );
}

function NeoBtn({ onClick, children, bg, style }) {
  return (
    <button
      onClick={onClick}
      style={{
        background: bg || '#FFE100',
        border: '3px solid #000',
        padding: '10px 18px',
        fontFamily: "'Montserrat', 'Noto Sans TC', sans-serif",
        fontWeight: 900,
        fontSize: '13px',
        cursor: 'pointer',
        boxShadow: '3px 3px 0 #000',
        transition: 'transform 150ms, box-shadow 150ms',
        ...style,
      }}
      onMouseOver={e => { e.target.style.transform = 'translate(-2px,-2px)'; e.target.style.boxShadow = '5px 5px 0 #000'; }}
      onMouseOut={e => { e.target.style.transform = ''; e.target.style.boxShadow = '3px 3px 0 #000'; }}
      onMouseDown={e => { e.target.style.transform = 'translate(1px,1px)'; e.target.style.boxShadow = '1px 1px 0 #000'; }}
      onMouseUp={e => { e.target.style.transform = 'translate(-2px,-2px)'; e.target.style.boxShadow = '5px 5px 0 #000'; }}
    >
      {children}
    </button>
  );
}

function NeoInput({ value, onChange, onKeyDown, placeholder, type, style }) {
  return (
    <input
      type={type || 'text'}
      value={value}
      onChange={onChange}
      onKeyDown={onKeyDown}
      placeholder={placeholder}
      style={{
        border: '3px solid #000',
        padding: '10px 14px',
        fontFamily: "'Montserrat', 'Noto Sans TC', sans-serif",
        fontWeight: 600,
        fontSize: '13px',
        outline: 'none',
        boxShadow: '3px 3px 0 #000',
        background: '#fff',
        ...style,
      }}
      onFocus={e => e.target.style.background = '#fffbe6'}
      onBlur={e => e.target.style.background = '#fff'}
    />
  );
}

/* ── 主應用 ──────────────────────────────────────── */

function App() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [activeTab, setActiveTab] = useState('dashboard');
  const [clock, setClock] = useState('');

  const loadData = useCallback(async () => {
    try {
      const res = await fetch('/api/data');
      const json = await res.json();
      setData(json);
    } catch (err) {
      console.error('載入失敗', err);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    loadData();
    const interval = setInterval(() => {
      setClock(new Date().toLocaleTimeString('zh-TW'));
    }, 1000);
    setClock(new Date().toLocaleTimeString('zh-TW'));
    return () => clearInterval(interval);
  }, [loadData]);

  if (loading) {
    return (
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ fontSize: '18px', fontWeight: 700 }}>載入中…</div>
      </div>
    );
  }

  const tabs = [
    { id: 'dashboard', label: '總覽', bg: '#FFE100' },
    { id: 'schedule', label: '行程', bg: '#00F0FF' },
    { id: 'notes', label: '小記', bg: '#B8FF3C' },
  ];

  return (
    <div style={{ minHeight: '100vh' }}>
      {/* Header */}
      <header style={{
        background: '#FF61D2',
        borderBottom: '3px solid #000',
        padding: '24px 32px',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
        boxShadow: '0 4px 0 #000',
      }}>
        <div>
          <span style={{
            fontSize: '28px',
            fontWeight: 900,
            color: '#000',
            letterSpacing: '-1px',
            fontFamily: "'Montserrat', sans-serif",
          }}>
            FlowGPS
            <span style={{
              background: '#FFE100',
              border: '3px solid #000',
              borderRadius: '9999px',
              padding: '2px 14px',
              marginLeft: '8px',
              boxShadow: '3px 3px 0 #000',
              fontSize: '14px',
              verticalAlign: 'middle',
            }}>日報</span>
          </span>
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{
            fontSize: '20px',
            fontWeight: 700,
            background: '#fff',
            border: '3px solid #000',
            borderRadius: '9999px',
            padding: '6px 20px',
            boxShadow: '6px 6px 0 #000',
            fontFamily: "'Montserrat', sans-serif",
          }}>{clock}</div>
          <div style={{ fontSize: '13px', fontWeight: 700, color: '#222', marginTop: '4px' }}>
            {data?.date}
          </div>
        </div>
      </header>

      {/* Tab bar */}
      <div style={{
        display: 'flex',
        gap: '8px',
        padding: '16px 32px 0',
        maxWidth: '1120px',
        margin: '0 auto',
        alignItems: 'flex-end',
      }}>
        {tabs.map(tab => (
          <button
            key={tab.id}
            onClick={() => setActiveTab(tab.id)}
            style={{
              background: activeTab === tab.id ? tab.bg : '#f0f0f0',
              border: '3px solid #000',
              borderBottom: activeTab === tab.id ? '3px solid ' + tab.bg : '3px solid #000',
              padding: '10px 24px',
              fontWeight: 900,
              fontSize: '14px',
              cursor: 'pointer',
              boxShadow: activeTab === tab.id ? '3px -3px 0 #000' : 'none',
              fontFamily: "'Montserrat', 'Noto Sans TC', sans-serif",
              marginBottom: activeTab === tab.id ? '-3px' : '0',
              position: 'relative',
              zIndex: activeTab === tab.id ? 2 : 1,
            }}
          >
            {tab.label}
          </button>
        ))}
        <div style={{ marginLeft: 'auto' }}>
          <button
            onClick={loadData}
            style={{
              background: '#00F0FF',
              border: '3px solid #000',
              borderRadius: '9999px',
              padding: '6px 16px',
              fontWeight: 900,
              fontSize: '12px',
              cursor: 'pointer',
              boxShadow: '3px 3px 0 #000',
              fontFamily: "'Montserrat', sans-serif",
            }}
          >
            重新整理
          </button>
        </div>
      </div>

      {/* Content */}
      <main style={{
        maxWidth: '1120px',
        margin: '0 auto',
        padding: '24px 32px',
        display: 'grid',
        gridTemplateColumns: 'repeat(2, 1fr)',
        gap: '24px',
      }}>
        {activeTab === 'dashboard' && <DashboardTab data={data} onRefresh={loadData} />}
        {activeTab === 'schedule' && <ScheduleTab data={data} onRefresh={loadData} />}
        {activeTab === 'notes' && <NotesTab data={data} onRefresh={loadData} />}
      </main>

      {/* Import banner */}
      {data?.dailyData && activeTab === 'dashboard' && (
        <ImportBanner dailyData={data.dailyData} onRefresh={loadData} />
      )}
    </div>
  );
}

/* ── 總覽頁籤 ──────────────────────────────────────── */

function DashboardTab({ data, onRefresh }) {
  const eisenhowerMap = {
    '🔴 四月主線（工作）': 'q1',
    '🔴 四月主線': 'q2',
    '💰 家庭財務': 'q1',
    '🟡 健康日常': 'q2',
    '🟠 系統維護': 'q3',
    '🔵 支線任務（空檔推進）': 'q4',
  };

  const quadrants = { q1: [], q2: [], q3: [], q4: [] };
  for (const section of (data?.todos || [])) {
    const bucket = eisenhowerMap[section.title];
    if (!bucket) continue;
    for (const item of section.items) {
      if (!item.done) quadrants[bucket].push(item.text);
    }
  }

  const qConfig = [
    { key: 'q1', label: '🔴 重要 ＋ 緊急', sub: '立刻做', bg: '#FFE5E5' },
    { key: 'q2', label: '🟡 重要 ＋ 不緊急', sub: '排時間', bg: '#FFFBE6' },
    { key: 'q3', label: '🟠 快速處理', sub: '委派或速做', bg: '#E8F4FF' },
    { key: 'q4', label: '⚪ 支線任務', sub: '空檔推進', bg: '#F0F0F0' },
  ];

  const renderItems = (items) => items.length
    ? items.map((t, i) => (
        <div key={i} style={{ fontSize: '12px', fontWeight: 600, padding: '3px 0', borderBottom: '1px dashed #ccc', lineHeight: 1.4 }}>
          · {t}
        </div>
      ))
    : <div style={{ color: '#bbb', fontSize: '12px', fontWeight: 600 }}>（空）</div>;

  return (
    <>
      {/* 快速記錄 */}
      <div style={{ gridColumn: 'span 2' }}>
        <Card title="✏️ 隨手記一筆" headerBg="#FF61D2" headerColor="#fff">
          <QuickNote onRefresh={onRefresh} />
          <div style={{ marginTop: '12px' }}>
            {(data?.manualNotes || []).map((n, i) => (
              <div key={i} style={{ display: 'flex', gap: '10px', padding: '8px 0', borderBottom: '1px dashed #ddd', fontSize: '13px', fontWeight: 600 }}>
                <span style={{ color: '#999', fontSize: '11px', whiteSpace: 'nowrap', marginTop: '2px' }}>{n.time}</span>
                <span>{n.text}</span>
              </div>
            ))}
          </div>
        </Card>
      </div>

      {/* 艾森豪矩陣 */}
      <div style={{ gridColumn: 'span 2' }}>
        <Card title="⚡ 艾森豪矩陣" headerBg="#FFE100">
          <div style={{ padding: 0 }}>
            {/* Axis label */}
            <div style={{
              display: 'flex', justifyContent: 'space-between',
              fontSize: '10px', fontWeight: 900, letterSpacing: '1px',
              padding: '4px 8px', background: '#000', color: '#fff',
            }}>
              <span>← 不緊急</span>
              <span style={{ fontSize: '12px' }}>⬆ 重要度 ⬇</span>
              <span>緊急 →</span>
            </div>
            {/* 4 quadrants */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', border: '3px solid #000', boxShadow: '6px 6px 0 #000' }}>
              {qConfig.map(q => (
                <div key={q.key} style={{ background: q.bg, border: '3px solid #000', padding: '16px', minHeight: '140px' }}>
                  <div style={{ fontSize: '11px', fontWeight: 900, letterSpacing: '1px', marginBottom: '10px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                    {q.label}
                    <span style={{ padding: '2px 8px', border: '2px solid #000', fontSize: '10px' }}>{q.sub}</span>
                  </div>
                  {renderItems(quadrants[q.key])}
                </div>
              ))}
            </div>
          </div>
        </Card>
      </div>

      {/* 各分類待辦卡片 */}
      {(data?.todos || []).filter(s => s.title !== '✅ 已完成' && s.items.length > 0).map((section, idx) => {
        const c = CARD_COLORS[section.title] || CARD_COLORS.default;
        return (
          <Card key={idx} title={section.title} headerBg={c.header} headerColor={c.text}>
            {section.items.map((item, i) => (
              <div key={i} style={{
                display: 'flex', alignItems: 'flex-start', gap: '10px',
                padding: '8px 0', borderBottom: '1px dashed #ddd',
                fontSize: '14px', fontWeight: 600,
                opacity: item.done ? 0.4 : 1,
                textDecoration: item.done ? 'line-through' : 'none',
                paddingLeft: item.indent ? '20px' : '0',
              }}>
                <div style={{
                  width: '16px', height: '16px',
                  border: '2px solid #000', borderRadius: '3px',
                  flexShrink: 0, marginTop: '2px',
                  background: item.done ? '#000' : '#fff',
                }}></div>
                <span>{item.text}</span>
              </div>
            ))}
          </Card>
        );
      })}

      {/* 今日摘要 */}
      {data?.summary && (
        <div style={{ gridColumn: 'span 2' }}>
          <Card title="📋 今日對話摘要" headerBg="#f0f0f0">
            <pre style={{ fontSize: '13px', fontWeight: 500, lineHeight: 1.8, whiteSpace: 'pre-wrap', maxHeight: '300px', overflowY: 'auto', color: '#222' }}>
              {data.summary}
            </pre>
          </Card>
        </div>
      )}
    </>
  );
}

/* ── 行程頁籤 ──────────────────────────────────────── */

function ScheduleTab({ data, onRefresh }) {
  const [time, setTime] = useState('');
  const [title, setTitle] = useState('');
  const schedule = data?.schedule || [];

  const addSchedule = async () => {
    if (!title.trim()) return;
    await fetch('/api/schedule', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ time, title })
    });
    setTime(''); setTitle(''); onRefresh();
  };

  const togglePrepared = async (id) => {
    await fetch('/api/schedule/toggle', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
    onRefresh();
  };

  const deleteSchedule = async (id) => {
    await fetch('/api/schedule/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
    onRefresh();
  };

  return (
    <div style={{ gridColumn: 'span 2' }} className="fade-in">
      <Card title="📅 今日行程" headerBg="#00F0FF">
        {/* 新增行程 */}
        <div style={{ display: 'flex', gap: '10px', marginBottom: '20px' }}>
          <NeoInput type="time" value={time} onChange={e => setTime(e.target.value)} style={{ width: '120px' }} />
          <NeoInput
            value={title}
            onChange={e => setTitle(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && addSchedule()}
            placeholder="行程名稱…"
            style={{ flex: 1 }}
          />
          <NeoBtn onClick={addSchedule} bg="#B8FF3C">新增</NeoBtn>
        </div>

        {/* 行程列表 */}
        {schedule.length === 0 ? (
          <div style={{ color: '#aaa', fontSize: '13px', fontWeight: 600 }}>今天還沒有行程</div>
        ) : (
          schedule.map(item => (
            <div key={item.id} style={{
              display: 'flex', alignItems: 'center', gap: '12px',
              padding: '12px', marginBottom: '8px',
              border: '3px solid #000',
              background: item.prepared ? '#e6ffe6' : '#fff',
              boxShadow: item.prepared ? '4px 4px 0 #006600' : '4px 4px 0 #000',
              transition: 'all 150ms',
            }}>
              <button
                onClick={() => togglePrepared(item.id)}
                style={{
                  width: '28px', height: '28px',
                  border: '3px solid #000', borderRadius: '50%',
                  background: item.prepared ? '#B8FF3C' : '#fff',
                  cursor: 'pointer', fontWeight: 900, fontSize: '14px',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}
              >
                {item.prepared ? '✓' : ''}
              </button>
              <span style={{ fontSize: '13px', fontWeight: 900, color: '#666', width: '50px' }}>
                {item.time || '--:--'}
              </span>
              <span style={{ flex: 1, fontSize: '14px', fontWeight: item.prepared ? 900 : 600 }}>
                {item.title}
              </span>
              <button
                onClick={() => deleteSchedule(item.id)}
                style={{
                  background: '#FF4444', color: '#fff',
                  border: '2px solid #000', borderRadius: '9999px',
                  padding: '2px 10px', fontSize: '11px', fontWeight: 900,
                  cursor: 'pointer',
                }}
              >
                刪除
              </button>
            </div>
          ))
        )}
      </Card>
    </div>
  );
}

/* ── 小記頁籤 ──────────────────────────────────────── */

function NotesTab({ data, onRefresh }) {
  const [inspiration, setInspiration] = useState(data?.notes?.inspiration || '');
  const [todos, setTodos] = useState(data?.notes?.todos || '');
  const [saved, setSaved] = useState(false);
  const saveTimer = useRef(null);

  const autoSave = useCallback((insp, td) => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      await fetch('/api/daily-notes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ inspiration: insp, todos: td })
      });
      setSaved(true);
      setTimeout(() => setSaved(false), 2000);
    }, 1500);
  }, []);

  const handleInspiration = (val) => { setInspiration(val); autoSave(val, todos); };
  const handleTodos = (val) => { setTodos(val); autoSave(inspiration, val); };

  const textareaStyle = {
    width: '100%',
    border: '3px solid #000',
    padding: '12px',
    fontFamily: "'Noto Sans TC', sans-serif",
    fontWeight: 600,
    fontSize: '13px',
    outline: 'none',
    boxShadow: '3px 3px 0 #000',
    resize: 'none',
  };

  return (
    <>
      {saved && (
        <div style={{
          position: 'fixed', top: '16px', right: '16px',
          background: '#B8FF3C', color: '#000',
          border: '3px solid #000', boxShadow: '4px 4px 0 #000',
          padding: '10px 20px', fontWeight: 900, fontSize: '13px', zIndex: 50,
        }} className="fade-in">
          已自動儲存 ✓
        </div>
      )}

      <div style={{ gridColumn: 'span 2' }} className="fade-in">
        <Card title="💡 靈感筆記" headerBg="#FFE100">
          <div style={{ fontSize: '11px', fontWeight: 900, color: '#666', marginBottom: '8px', letterSpacing: '0.5px' }}>
            記下靈感，23:59 自動存入對話摘要資料夾
          </div>
          <textarea
            value={inspiration}
            onChange={e => handleInspiration(e.target.value)}
            rows={6}
            placeholder="今天有什麼靈感？"
            style={textareaStyle}
            onFocus={e => e.target.style.background = '#fffbe6'}
            onBlur={e => e.target.style.background = '#fff'}
          />
        </Card>
      </div>

      <div style={{ gridColumn: 'span 2' }} className="fade-in">
        <Card title="✏️ 待辦速記" headerBg="#B8FF3C">
          <div style={{ fontSize: '11px', fontWeight: 900, color: '#666', marginBottom: '8px', letterSpacing: '0.5px' }}>
            每行一筆，23:59 自動寫入玩家待辦任務（支線任務區）
          </div>
          <textarea
            value={todos}
            onChange={e => handleTodos(e.target.value)}
            rows={6}
            placeholder="一行一筆待辦事項…"
            style={textareaStyle}
            onFocus={e => e.target.style.background = '#fffbe6'}
            onBlur={e => e.target.style.background = '#fff'}
          />
        </Card>
      </div>

      <div style={{ gridColumn: 'span 2' }} className="fade-in">
        <Card title="📌 快速記錄" headerBg="#FF61D2" headerColor="#fff">
          <QuickNote onRefresh={onRefresh} />
          <div style={{ marginTop: '12px' }}>
            {(data?.manualNotes || []).map((n, i) => (
              <div key={i} style={{ display: 'flex', gap: '10px', padding: '8px 0', borderBottom: '1px dashed #ddd', fontSize: '13px', fontWeight: 600 }}>
                <span style={{ color: '#999', fontSize: '11px', whiteSpace: 'nowrap', marginTop: '2px' }}>{n.time}</span>
                <span>{n.text}</span>
              </div>
            ))}
          </div>
        </Card>
      </div>
    </>
  );
}

/* ── 共用元件 ──────────────────────────────────────── */

function QuickNote({ onRefresh }) {
  const [note, setNote] = useState('');

  const addNote = async () => {
    if (!note.trim()) return;
    await fetch('/api/note', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ note })
    });
    setNote(''); onRefresh();
  };

  return (
    <div style={{ display: 'flex', gap: '10px' }}>
      <NeoInput
        value={note}
        onChange={e => setNote(e.target.value)}
        onKeyDown={e => e.key === 'Enter' && addNote()}
        placeholder="隨手記一筆…"
        style={{ flex: 1 }}
      />
      <NeoBtn onClick={addNote}>記錄</NeoBtn>
    </div>
  );
}

function ImportBanner({ dailyData, onRefresh }) {
  const [show, setShow] = useState(true);
  if (!show) return null;

  const doImport = async () => {
    await fetch('/api/import', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(dailyData)
    });
    setShow(false); onRefresh();
  };

  return (
    <div style={{
      position: 'fixed', bottom: '24px', left: '50%', transform: 'translateX(-50%)',
      background: '#000', color: '#fff',
      border: '3px solid #000', boxShadow: '6px 6px 0 #FF61D2',
      padding: '16px 24px',
      display: 'flex', alignItems: 'center', gap: '16px', zIndex: 50,
    }} className="fade-in">
      <span style={{ fontSize: '14px', fontWeight: 900 }}>偵測到 daily-data.json，要匯入嗎？</span>
      <NeoBtn onClick={doImport} bg="#B8FF3C">匯入</NeoBtn>
      <button
        onClick={() => setShow(false)}
        style={{ background: 'none', border: 'none', color: '#888', cursor: 'pointer', fontWeight: 900, fontSize: '13px' }}
      >
        略過
      </button>
    </div>
  );
}

/* ── 渲染 ──────────────────────────────────────── */

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
