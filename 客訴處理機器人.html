<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客訴處理機器人（223版）</title>
<style>
* { box-sizing: border-box; }
body { font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif; max-width: 700px; margin: 0 auto; padding: 16px; background: #fdf6f0; color: #2c1810; font-size: 15px; }
h1 { color: #8b3a0f; font-size: 20px; border-bottom: 2px solid #d4813a; padding-bottom: 8px; margin-bottom: 6px; }
.subtitle { font-size: 12px; color: #999; margin-bottom: 16px; }
.progress-bar { background: #f0e0d0; border-radius: 10px; height: 12px; margin-bottom: 20px; overflow: hidden; }
.progress-fill { background: linear-gradient(90deg, #d4813a, #e8a060); height: 100%; border-radius: 10px; transition: width 0.4s; }
.step-card { background: white; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid #e0c8b0; transition: border-color 0.3s; }
.step-card.done { border-left-color: #27ae60; background: #f0faf4; }
.step-card.active { border-left-color: #d4813a; }
.step-header { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; }
.step-num { font-size: 11px; color: #aaa; min-width: 24px; margin-top: 2px; }
.step-title { flex: 1; font-weight: 600; font-size: 15px; }
.step-card.done .step-title { color: #27ae60; text-decoration: line-through; }
.check-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #d4813a; background: white; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.step-card.done .check-btn { background: #27ae60; border-color: #27ae60; color: white; }
.step-detail { font-size: 13px; color: #666; margin-top: 8px; padding-left: 36px; line-height: 1.8; display: none; }
.step-detail.show { display: block; }
.step-detail ul { margin: 4px 0; padding-left: 16px; }
.step-detail li { margin-bottom: 2px; }
.tip { background: #fff8f0; border-left: 3px solid #f39c12; padding: 6px 10px; border-radius: 0 4px 4px 0; margin-top: 8px; font-size: 12px; color: #8b6914; }
.note-area { width: 100%; margin-top: 8px; padding: 6px 8px; border: 1px solid #e0c8b0; border-radius: 6px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 50px; }
.summary-card { background: white; border-radius: 10px; padding: 16px; margin-top: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: none; }
.summary-card.show { display: block; }
.btn { padding: 8px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit; margin: 4px; }
.btn-primary { background: #d4813a; color: white; }
.btn-gray { background: #bbb; color: white; }
.btn-success { background: #27ae60; color: white; font-size: 16px; padding: 12px 30px; }
.all-done { text-align: center; padding: 20px; font-size: 18px; color: #27ae60; display: none; }
.counter { font-size: 13px; color: #999; text-align: right; margin-bottom: 8px; }
.date-display { font-size: 13px; color: #d4813a; font-weight: bold; }
</style>
</head>
<body>
<h1>📋 客訴處理機器人</h1>
<div class="subtitle">223版 · <span class="date-display" id="dateDisplay"></span></div>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
<div class="counter" id="counter">0 / 7 完成</div>

<div id="steps"></div>

<div class="all-done" id="allDone">
  ✅ 今天的客訴全部處理完成！辛苦了！
</div>

<div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">
  <button class="btn btn-gray" onclick="resetAll()">🔄 重新開始</button>
</div>

<script>
const STEPS = [
  {
    title: '早上收紙樣',
    detail: `<ul>
      <li>上班後查看客戶寄來的紙樣</li>
      <li>拆開紙樣</li>
      <li>將客訴異議單釘在紙樣上面</li>
    </ul>`,
    tip: '工具：剪刀、釘書機',
    placeholder: '今日幾件？客戶名稱？'
  },
  {
    title: '傳真版處理',
    detail: `<ul>
      <li>收到客訴異議單傳真版</li>
      <li>剪掉不需要的資訊</li>
      <li>COPY 備份</li>
    </ul>`,
    tip: '未來目標：5月起請客戶改用 MAIL，減少傳真格式問題',
    placeholder: '傳真件數？有無格式問題？'
  },
  {
    title: '登入業務專用 MAIL',
    detail: `<ul>
      <li>登入業務專用信箱</li>
      <li>查收客訴相關信件</li>
      <li>確認有無新件需處理</li>
    </ul>`,
    tip: '',
    placeholder: '信件有無異狀？'
  },
  {
    title: '287 副理審核後入 ERP',
    detail: `<ul>
      <li>等 287 副理看完確認</li>
      <li>審核通過後入 ERP 系統</li>
      <li>取得客訴編號</li>
    </ul>`,
    tip: '需要副理確認才能進行，注意追蹤審核進度',
    placeholder: '本次客訴編號？'
  },
  {
    title: 'FAX 回客戶（@今天）',
    detail: `<ul>
      <li>當天完成 FAX 給客戶</li>
      <li>確認傳真已送達</li>
    </ul>`,
    tip: '⏰ 今天要做完，不能拖到明天',
    placeholder: '傳真確認？'
  },
  {
    title: 'COPY 分發',
    detail: `<ul>
      <li>一份給秀雲姐</li>
      <li>一份依區域：<b>南北</b> → 秀芬姐 ／ <b>中部</b> → 瓊雯姐</li>
    </ul>`,
    tip: '南北和中部分開，不要給錯人',
    placeholder: '分發完成？'
  },
  {
    title: '收起來歸檔',
    detail: `<ul>
      <li>依日期或客戶整理歸檔</li>
      <li>確認紙樣和文件都放好</li>
    </ul>`,
    tip: '',
    placeholder: '備註'
  }
];

let checked = new Array(7).fill(false);
let expanded = new Array(7).fill(false);

function init() {
  document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('zh-TW', {year:'numeric',month:'long',day:'numeric',weekday:'short'});
  renderSteps();
}

function renderSteps() {
  let container = document.getElementById('steps');
  container.innerHTML = '';
  STEPS.forEach((s, i) => {
    let card = document.createElement('div');
    card.className = 'step-card' + (checked[i] ? ' done' : (i === firstUnchecked() ? ' active' : ''));
    card.innerHTML = `
      <div class="step-header" onclick="toggleExpand(${i})">
        <span class="step-num">STEP ${i+1}</span>
        <span class="step-title">${s.title}</span>
        <button class="check-btn" onclick="event.stopPropagation();toggleCheck(${i})">${checked[i] ? '✓' : ''}</button>
      </div>
      <div class="step-detail ${expanded[i] ? 'show' : ''}">
        ${s.detail}
        ${s.tip ? '<div class="tip">💡 ' + s.tip + '</div>' : ''}
        <textarea class="note-area" id="note_${i}" placeholder="${s.placeholder}"></textarea>
      </div>`;
    container.appendChild(card);
  });
  updateProgress();
}

function firstUnchecked() {
  return checked.indexOf(false);
}

function toggleCheck(i) {
  checked[i] = !checked[i];
  if (checked[i] && !expanded[i]) expanded[i] = false;
  renderSteps();
  if (checked.every(v => v)) {
    document.getElementById('allDone').style.display = 'block';
  } else {
    document.getElementById('allDone').style.display = 'none';
  }
}

function toggleExpand(i) {
  expanded[i] = !expanded[i];
  renderSteps();
}

function updateProgress() {
  let done = checked.filter(v => v).length;
  document.getElementById('progressFill').style.width = (done / 7 * 100) + '%';
  document.getElementById('counter').textContent = done + ' / 7 完成';
}

function resetAll() {
  if (!confirm('確定要重新開始？')) return;
  checked = new Array(7).fill(false);
  expanded = new Array(7).fill(false);
  document.getElementById('allDone').style.display = 'none';
  renderSteps();
}

init();
</script>
</body>
</html>
