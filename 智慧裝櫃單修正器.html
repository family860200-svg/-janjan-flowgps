<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧裝櫃單辨識修正器 | 廣源專用</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --success: #27ae60;
            --danger: #c0392b;
            --bg: #f4f7f6;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--primary);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            color: var(--primary);
            border-bottom: 3px solid var(--accent);
            display: inline-block;
            padding-bottom: 5px;
        }

        .glass-card {
            background: var(--glass);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        /* OCR Drop Zone */
        #dropzone {
            border: 2px dashed var(--accent);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            background: rgba(230, 126, 34, 0.05);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 15px;
        }
        #dropzone:hover { background: rgba(230, 126, 34, 0.1); }
        #dropzone.dragover { background: rgba(230, 126, 34, 0.2); border-style: solid; }
        
        .progress-box {
            display: none;
            margin-top: 15px;
        }
        .progress-bar {
            height: 10px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
        }
        #progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }

        .setup-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
            margin-bottom: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column; gap: 5px;
        }

        label {
            font-size: 12px; font-weight: bold; color: #666;
        }

        input, select {
            padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;
        }

        .btn {
            padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s; display: flex; align-items: center; gap: 8px; justify-content: center;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-accent { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: white; }

        table {
            width: 100%; border-collapse: collapse; margin-top: 15px; background: white; font-size: 13px;
        }

        th {
            background: #f8f9fa; color: #333; text-align: center; padding: 10px; border-bottom: 2px solid #eee;
        }

        td {
            padding: 8px; border-bottom: 1px solid #eee; text-align: center;
        }

        .weight-cell { font-weight: bold; }
        .actual-weight { color: var(--accent); }

        .summary-bar {
            display: flex; justify-content: space-between; background: var(--primary); color: white; padding: 15px 25px; border-radius: 8px; margin-top: 10px; font-weight: bold;
        }

        .overweight {
            background: var(--danger) !important; animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.8; }
        }

        .remove-btn { color: #ccc; cursor: pointer; }
        .remove-btn:hover { color: var(--danger); }

        #preview-img {
            max-height: 200px; display: none; margin: 10px auto; border-radius: 8px; border: 1px solid #ddd;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .glass-card { box-shadow: none; border: 1px solid #eee; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🤖 智慧裝櫃單辨識修正器</h1>
        <p class="no-print" style="font-size: 13px; color: #666;">拍照或上傳訂貨單圖片，自動辨識表格內容</p>
    </header>

    <!-- OCR Area -->
    <div class="glass-card no-print">
        <div id="dropzone" onclick="document.getElementById('file-input').click()">
            <div style="font-size: 40px; margin-bottom: 10px;">📸</div>
            <strong>點擊或拖曳「外銷訂貨單」照片到這裡</strong>
            <div style="font-size: 12px; color: #888; margin-top: 5px;">支援自動辨識 櫃次、尺寸、重量、令數</div>
            <input type="file" id="file-input" hidden accept="image/*">
        </div>

        <img id="preview-img" alt="Preview">

        <div class="progress-box" id="progress-box">
            <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px;">
                <span id="status-text">正在辨識文字中...</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
        </div>
        
        <div class="setup-row" style="margin-top: 20px;">
            <div class="input-group">
                <label>全局重量修正 (%)</label>
                <input type="number" id="global-adjust" value="0" step="0.1" oninput="applyGlobalAdjust()">
            </div>
            <div class="input-group">
                <label>貨櫃限重 (kg)</label>
                <input type="number" id="weight-limit" value="26500" oninput="calculateAll()">
            </div>
            <div style="flex-grow: 1;"></div>
            <button class="btn btn-accent" onclick="rows=[]; renderTable(); calculateAll();">🗑 清空數據</button>
        </div>
    </div>

    <!-- Data Table -->
    <div class="glass-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h2 style="font-size: 18px; margin: 0;">📦 數據預覽與修正</h2>
            <button class="btn btn-success no-print" onclick="window.print()">🖨️ 列印結果</button>
        </div>
        
        <table id="data-table">
            <thead>
                <tr>
                    <th width="40">櫃</th>
                    <th>基重</th>
                    <th>尺寸 (inch)</th>
                    <th>令數</th>
                    <th>束數</th>
                    <th>理論重量</th>
                    <th style="background: #fff3e0;">修正係數</th>
                    <th style="background: #fff3e0;">實際重量 (kg)</th>
                    <th width="30" class="no-print"></th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- Rows injected here -->
            </tbody>
        </table>

        <div id="container-summaries"></div>

        <div class="summary-bar" id="grand-total-bar">
            <span>整單總計 (Grand Total)</span>
            <span id="grand-total-val">0 kg</span>
        </div>
    </div>
</div>

<script>
    let rows = [];
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');
    const previewImg = document.getElementById('preview-img');
    const progressBox = document.getElementById('progress-box');

    // --- OCR Logic ---
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
        e.preventDefault(); dropzone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) handleFile(file);
    });
    fileInput.addEventListener('change', () => {
        if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    async function handleFile(file) {
        if (!file.type.startsWith('image/')) return;
        previewImg.src = URL.createObjectURL(file);
        previewImg.style.display = 'block';
        progressBox.style.display = 'block';
        document.getElementById('status-text').innerText = "載入 OCR 引擎...";
        
        try {
            const worker = await Tesseract.createWorker('chi_tra+eng', 1, {
                logger: m => {
                    if (m.status === 'recognizing text') {
                        const pct = Math.round(m.progress * 100);
                        document.getElementById('percent-text').innerText = pct + "%";
                        document.getElementById('progress-fill').style.width = pct + "%";
                        document.getElementById('status-text').innerText = "正在分析表格內容...";
                    }
                }
            });
            const { data: { text } } = await worker.recognize(file);
            await worker.terminate();
            parseOCRText(text);
            document.getElementById('status-text').innerText = "辨識完成 ✓";
            setTimeout(() => { progressBox.style.display = 'none'; }, 2000);
        } catch (err) { alert("辨識出錯：" + err.message); }
    }

    function parseOCRText(text) {
        const lines = text.split('\n');
        let currentCabinet = 1;
        lines.forEach(line => {
            const cleanLine = line.replace(/\|/g, '').replace(/\s+/g, ' ').trim();
            if (cleanLine.includes('第') && cleanLine.includes('櫃')) {
                const match = cleanLine.match(/第\s*(\d+)\s*櫃/);
                if (match) currentCabinet = match[1];
                return;
            }
            // Pattern for: [Cab] [PaperType] GSM Size(W x L) Weight Bundles Reams
            const rowMatch = cleanLine.match(/(\d+)?\s*[A-Z0-9]{2}\s*(\d{3})\s*(\d+\.?\d*)\s*[xX*×]\s*(\d+\.?\d*)\s*(\d{3,})\s*(\d+)?\s*(\d+\.?\d*)?/);
            if (rowMatch) {
                addRow({
                    cabinet: rowMatch[1] || currentCabinet,
                    gsm: rowMatch[2],
                    size: rowMatch[3] + " x " + rowMatch[4],
                    theoryWeight: rowMatch[5],
                    bundles: rowMatch[6] || 0,
                    reams: rowMatch[7] || 0
                });
            }
        });
        if (rows.length === 0) alert("辨識不到有效數據，請確認照片清晰度與表格對焦。");
    }

    function addRow(data = {}) {
        const row = {
            id: Date.now() + Math.random(),
            cabinet: data.cabinet || 1,
            gsm: data.gsm || 300,
            size: data.size || "",
            reams: data.reams || 0,
            bundles: data.bundles || 0,
            theoryWeight: parseFloat(data.theoryWeight) || 0,
            factor: 1.0,
            actualWeight: parseFloat(data.theoryWeight) || 0
        };
        rows.push(row);
        renderTable(); calculateAll();
    }

    function updateRow(id, field, value) {
        const row = rows.find(r => r.id === id);
        if (!row) return;
        if (field === 'theoryWeight') {
            row.theoryWeight = parseFloat(value) || 0;
            row.actualWeight = Math.round(row.theoryWeight * row.factor);
        } else if (field === 'factor') {
            row.factor = parseFloat(value) || 1.0;
            row.actualWeight = Math.round(row.theoryWeight * row.factor);
        } else if (field === 'actualWeight') {
            row.actualWeight = parseFloat(value) || 0;
            if (row.theoryWeight > 0) row.factor = parseFloat((row.actualWeight / row.theoryWeight).toFixed(4));
        } else { row[field] = value; }
        calculateAll();
    }

    function applyGlobalAdjust() {
        const factor = 1 + ((parseFloat(document.getElementById('global-adjust').value) || 0) / 100);
        rows.forEach(r => { r.factor = factor; r.actualWeight = Math.round(r.theoryWeight * factor); });
        renderTable(); calculateAll();
    }

    function removeRow(id) { rows = rows.filter(r => r.id !== id); renderTable(); calculateAll(); }

    function calculateAll() {
        const limit = parseFloat(document.getElementById('weight-limit').value) || 999999;
        const cabinets = [...new Set(rows.map(r => r.cabinet))].sort();
        const summaryContainer = document.getElementById('container-summaries');
        summaryContainer.innerHTML = "";
        let grandTotal = 0;
        cabinets.forEach(cab => {
            const cabRows = rows.filter(r => r.cabinet == cab);
            const totalActual = cabRows.reduce((sum, r) => sum + (parseFloat(r.actualWeight) || 0), 0);
            grandTotal += totalActual;
            const isOver = totalActual > limit;
            const div = document.createElement('div');
            div.className = `summary-bar ${isOver ? 'overweight' : ''}`;
            div.style.background = "#5d6d7e"; div.style.marginBottom = "5px";
            div.innerHTML = `<span>第 ${cab} 櫃 小計</span><span>實際重: ${totalActual.toLocaleString()} kg / 限重: ${limit.toLocaleString()} kg</span>`;
            summaryContainer.appendChild(div);
        });
        document.getElementById('grand-total-val').innerText = grandTotal.toLocaleString() + " kg";
    }

    function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = "";
        rows.forEach(r => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" value="${r.cabinet}" style="width:30px; text-align:center;" oninput="updateRow(${r.id}, 'cabinet', this.value)"></td>
                <td><input type="text" value="${r.gsm}" style="width:40px; text-align:center;" oninput="updateRow(${r.id}, 'gsm', this.value)"></td>
                <td><input type="text" value="${r.size}" style="width:140px;" oninput="updateRow(${r.id}, 'size', this.value)"></td>
                <td><input type="number" value="${r.reams}" style="width:60px;" step="0.01" oninput="updateRow(${r.id}, 'reams', this.value)"></td>
                <td><input type="number" value="${r.bundles}" style="width:60px;" oninput="updateRow(${r.id}, 'bundles', this.value)"></td>
                <td><input type="number" value="${r.theoryWeight}" style="width:80px; font-weight:bold;" oninput="updateRow(${r.id}, 'theoryWeight', this.value)"></td>
                <td style="background: #fff8e1;"><input type="number" value="${r.factor}" style="width:70px; color:var(--accent); font-weight:bold;" step="0.001" oninput="updateRow(${r.id}, 'factor', this.value)"></td>
                <td style="background: #fff8e1;"><input type="number" value="${r.actualWeight}" style="width:90px; color:var(--accent); font-weight:bold;" oninput="updateRow(${r.id}, 'actualWeight', this.value)"></td>
                <td class="no-print"><span class="remove-btn" onclick="removeRow(${r.id})">✕</span></td>
            `;
            tbody.appendChild(tr);
        });
    }
</script>
</body>
</html>
