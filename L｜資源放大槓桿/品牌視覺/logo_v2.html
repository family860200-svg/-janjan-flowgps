<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #F7F3EE;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 48px;
    padding: 60px 40px;
  }
  .card {
    background: #fff;
    border-radius: 6px;
    padding: 44px 40px 32px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.07);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    min-width: 240px;
  }
  .tag {
    font-size: 11px;
    color: #aaa;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    font-family: 'Helvetica Neue', sans-serif;
  }
</style>
</head>
<body>

<!-- A: 縫線符號 + 橫排文字 -->
<div class="card">
  <svg width="220" height="90" viewBox="0 0 220 90" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 書脊縫線符號 (3個結) -->
    <!-- 中央垂直線 = 書脊 -->
    <line x1="26" y1="8" x2="26" y2="82" stroke="#3D2B1A" stroke-width="2"/>
    <!-- 結 1 -->
    <path d="M14,22 C18,22 22,26 26,26 C30,26 34,22 38,22" stroke="#3D2B1A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- 結 2 -->
    <path d="M14,45 C18,45 22,49 26,49 C30,49 34,45 38,45" stroke="#3D2B1A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- 結 3 -->
    <path d="M14,68 C18,68 22,72 26,72 C30,72 34,68 38,68" stroke="#3D2B1A" stroke-width="1.8" fill="none" stroke-linecap="round"/>

    <!-- 文字 -->
    <text x="56" y="38" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#3D2B1A" letter-spacing="1">Jan Jan's</text>
    <text x="57" y="62" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#7A5230" letter-spacing="5.5">ARTISAN ATELIER</text>
    <!-- 細線 -->
    <line x1="56" y1="70" x2="210" y2="70" stroke="#C8BFA8" stroke-width="0.7"/>
  </svg>
  <div class="tag">A — 橫排</div>
</div>

<!-- B: 只有符號（大頭照用） -->
<div class="card">
  <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 外框正方圓 -->
    <rect x="4" y="4" width="112" height="112" rx="8" stroke="#3D2B1A" stroke-width="1.2"/>
    <!-- 書脊縫線符號，置中放大 -->
    <line x1="60" y1="18" x2="60" y2="102" stroke="#3D2B1A" stroke-width="2.2"/>
    <!-- 結 1 -->
    <path d="M42,32 C49,32 54,38 60,38 C66,38 71,32 78,32" stroke="#3D2B1A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- 結 2 -->
    <path d="M42,60 C49,60 54,66 60,66 C66,66 71,60 78,60" stroke="#3D2B1A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- 結 3 -->
    <path d="M42,88 C49,88 54,94 60,94 C66,94 71,88 78,88" stroke="#3D2B1A" stroke-width="2" fill="none" stroke-linecap="round"/>
  </svg>
  <div class="tag">B — 圖示（大頭照）</div>
</div>

<!-- C: 堆疊書本側視圖（極簡）-->
<div class="card">
  <svg width="200" height="110" viewBox="0 0 200 110" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 三本書疊放側視圖 -->
    <!-- 書1（最下） -->
    <rect x="20" y="68" width="90" height="16" rx="2" fill="none" stroke="#3D2B1A" stroke-width="1.6"/>
    <!-- 書1縫線點 -->
    <circle cx="32" cy="76" r="1.8" fill="#3D2B1A"/>
    <circle cx="48" cy="76" r="1.8" fill="#3D2B1A"/>
    <circle cx="64" cy="76" r="1.8" fill="#3D2B1A"/>
    <circle cx="80" cy="76" r="1.8" fill="#3D2B1A"/>
    <circle cx="96" cy="76" r="1.8" fill="#3D2B1A"/>

    <!-- 書2（中） -->
    <rect x="20" y="44" width="90" height="16" rx="2" fill="none" stroke="#3D2B1A" stroke-width="1.6"/>
    <circle cx="32" cy="52" r="1.8" fill="#3D2B1A"/>
    <circle cx="48" cy="52" r="1.8" fill="#3D2B1A"/>
    <circle cx="64" cy="52" r="1.8" fill="#3D2B1A"/>
    <circle cx="80" cy="52" r="1.8" fill="#3D2B1A"/>
    <circle cx="96" cy="52" r="1.8" fill="#3D2B1A"/>

    <!-- 書3（上） -->
    <rect x="20" y="20" width="90" height="16" rx="2" fill="none" stroke="#3D2B1A" stroke-width="1.6"/>
    <circle cx="32" cy="28" r="1.8" fill="#3D2B1A"/>
    <circle cx="48" cy="28" r="1.8" fill="#3D2B1A"/>
    <circle cx="64" cy="28" r="1.8" fill="#3D2B1A"/>
    <circle cx="80" cy="28" r="1.8" fill="#3D2B1A"/>
    <circle cx="96" cy="28" r="1.8" fill="#3D2B1A"/>

    <!-- 文字 -->
    <text x="122" y="50" font-family="Georgia, serif" font-size="13" fill="#3D2B1A" letter-spacing="1.5">Jan Jan's</text>
    <text x="122" y="66" font-family="'Helvetica Neue', sans-serif" font-size="7.5" fill="#7A5230" letter-spacing="3">ARTISAN</text>
    <text x="122" y="78" font-family="'Helvetica Neue', sans-serif" font-size="7.5" fill="#7A5230" letter-spacing="3">ATELIER</text>
  </svg>
  <div class="tag">C — 疊書側視</div>
</div>

<!-- D: 縫線符號圓形（印章感） -->
<div class="card">
  <svg width="130" height="130" viewBox="0 0 130 130" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="65" cy="65" r="58" stroke="#3D2B1A" stroke-width="1.4"/>
    <circle cx="65" cy="65" r="50" stroke="#3D2B1A" stroke-width="0.6"/>

    <!-- 縫線符號 -->
    <line x1="65" y1="24" x2="65" y2="92" stroke="#3D2B1A" stroke-width="2"/>
    <path d="M50,36 C56,36 60,41 65,41 C70,41 74,36 80,36" stroke="#3D2B1A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M50,58 C56,58 60,63 65,63 C70,63 74,58 80,58" stroke="#3D2B1A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M50,80 C56,80 60,85 65,85 C70,85 74,80 80,80" stroke="#3D2B1A" stroke-width="1.8" fill="none" stroke-linecap="round"/>

    <!-- 下方文字 -->
    <text x="65" y="110" text-anchor="middle" font-family="'Helvetica Neue', sans-serif" font-size="8" fill="#3D2B1A" letter-spacing="4">JAN JAN'S</text>
  </svg>
  <div class="tag">D — 圓形印章</div>
</div>

</body>
</html>
