<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowGPS 日報 ｜ JANJAN</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        cream: '#F5F0E8',
        paper: '#FEFCF7',
        milk: '#D4C5A9',
        tea: '#8B7355',
        earth: '#6B8E6B',
        bark: '#4A3728',
        sand: '#E8DFD0',
        warmgray: '#B5A898',
      },
      fontFamily: {
        sans: ['Noto Sans TC', 'sans-serif'],
      }
    }
  }
}
</script>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Noto Sans TC', sans-serif; background: #F5F0E8; }
  .card-shadow { box-shadow: 0 2px 12px rgba(74,55,40,0.08); }
  .btn-press:active { transform: scale(0.97); }
  textarea:focus, input:focus { outline: none; box-shadow: 0 0 0 2px #8B7355; }
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D4C5A9; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── 主應用 ─────────────────────────────────────────

function App() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [activeTab, setActiveTab] = useState('dashboard');
  const [clock, setClock] = useState('');

  const loadData = useCallback(async () => {
    try {
      const res = await fetch('/api/data');
      const json = await res.json();
      setData(json);
    } catch (err) {
      console.error('載入失敗', err);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    loadData();
    const interval = setInterval(() => {
      setClock(new Date().toLocaleTimeString('zh-TW'));
    }, 1000);
    setClock(new Date().toLocaleTimeString('zh-TW'));
    return () => clearInterval(interval);
  }, [loadData]);

  if (loading) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-cream">
        <div className="text-tea text-lg font-medium">載入中…</div>
      </div>
    );
  }

  const tabs = [
    { id: 'dashboard', label: '總覽' },
    { id: 'schedule', label: '行程' },
    { id: 'notes', label: '小記' },
  ];

  return (
    <div className="min-h-screen bg-cream">
      {/* Header */}
      <header className="bg-paper border-b-2 border-sand px-6 py-4 card-shadow">
        <div className="max-w-5xl mx-auto flex items-center justify-between">
          <div>
            <h1 className="text-2xl font-black text-bark tracking-tight">
              FlowGPS
              <span className="ml-2 text-sm font-bold bg-tea text-paper px-3 py-1 rounded-full">
                日報
              </span>
            </h1>
          </div>
          <div className="text-right">
            <div className="text-xl font-bold text-tea tabular-nums">{clock}</div>
            <div className="text-xs text-warmgray mt-0.5">{data?.date}</div>
          </div>
        </div>
      </header>

      {/* Tab bar */}
      <nav className="bg-paper border-b border-sand">
        <div className="max-w-5xl mx-auto flex gap-1 px-6 pt-2">
          {tabs.map(tab => (
            <button
              key={tab.id}
              onClick={() => setActiveTab(tab.id)}
              className={`px-5 py-2.5 text-sm font-bold rounded-t-lg transition-colors btn-press ${
                activeTab === tab.id
                  ? 'bg-cream text-bark border-t-2 border-x-2 border-tea -mb-px'
                  : 'text-warmgray hover:text-tea hover:bg-cream/50'
              }`}
            >
              {tab.label}
            </button>
          ))}
          <button
            onClick={loadData}
            className="ml-auto px-3 py-2 text-xs font-bold text-tea hover:text-bark transition-colors btn-press"
          >
            重新整理
          </button>
        </div>
      </nav>

      {/* Content */}
      <main className="max-w-5xl mx-auto px-6 py-6">
        {activeTab === 'dashboard' && <DashboardTab data={data} onRefresh={loadData} />}
        {activeTab === 'schedule' && <ScheduleTab data={data} onRefresh={loadData} />}
        {activeTab === 'notes' && <NotesTab data={data} onRefresh={loadData} />}
      </main>

      {/* Import banner */}
      {data?.dailyData && activeTab === 'dashboard' && (
        <ImportBanner dailyData={data.dailyData} onRefresh={loadData} />
      )}
    </div>
  );
}

// ── 總覽頁籤 ───────────────────────────────────────

function DashboardTab({ data, onRefresh }) {
  // 艾森豪矩陣分類
  const eisenhowerMap = {
    '🔴 四月主線（工作）': 'q1',
    '🔴 四月主線': 'q2',
    '💰 家庭財務': 'q1',
    '🟡 健康日常': 'q2',
    '🟠 系統維護': 'q3',
    '🔵 支線任務（空檔推進）': 'q4',
  };

  const quadrants = { q1: [], q2: [], q3: [], q4: [] };
  for (const section of (data?.todos || [])) {
    const bucket = eisenhowerMap[section.title];
    if (!bucket) continue;
    for (const item of section.items) {
      if (!item.done) quadrants[bucket].push({ ...item, section: section.title });
    }
  }

  const qConfig = [
    { key: 'q1', label: '重要＋緊急', sub: '立刻做', color: 'bg-red-50 border-red-200', dot: 'bg-red-400' },
    { key: 'q2', label: '重要＋不緊急', sub: '排時間', color: 'bg-amber-50 border-amber-200', dot: 'bg-amber-400' },
    { key: 'q3', label: '快速處理', sub: '委派或速做', color: 'bg-sky-50 border-sky-200', dot: 'bg-sky-400' },
    { key: 'q4', label: '支線任務', sub: '空檔推進', color: 'bg-stone-50 border-stone-200', dot: 'bg-stone-400' },
  ];

  return (
    <div className="space-y-6 fade-in">
      {/* 快速記錄 */}
      <QuickNote onRefresh={onRefresh} />

      {/* 艾森豪矩陣 */}
      <Card title="艾森豪矩陣" icon="⚡">
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
          {qConfig.map(q => (
            <div key={q.key} className={`rounded-lg border p-4 ${q.color}`}>
              <div className="flex items-center gap-2 mb-3">
                <div className={`w-2.5 h-2.5 rounded-full ${q.dot}`}></div>
                <span className="text-xs font-black text-bark">{q.label}</span>
                <span className="text-xs text-warmgray">— {q.sub}</span>
              </div>
              {quadrants[q.key].length === 0 ? (
                <p className="text-xs text-warmgray">（空）</p>
              ) : (
                <ul className="space-y-1.5">
                  {quadrants[q.key].map((item, i) => (
                    <li key={i} className="text-sm text-bark leading-relaxed flex gap-2">
                      <span className="text-warmgray shrink-0">·</span>
                      <span>{item.text}</span>
                    </li>
                  ))}
                </ul>
              )}
            </div>
          ))}
        </div>
      </Card>

      {/* 各分類待辦 */}
      {(data?.todos || []).filter(s => s.title !== '✅ 已完成' && s.items.length > 0).map((section, idx) => (
        <Card key={idx} title={section.title}>
          <ul className="space-y-2">
            {section.items.map((item, i) => (
              <li
                key={i}
                className={`flex items-start gap-3 text-sm ${
                  item.done ? 'opacity-40 line-through' : ''
                } ${item.indent ? 'ml-5' : ''}`}
              >
                <span className={`mt-0.5 w-4 h-4 rounded border-2 shrink-0 ${
                  item.done ? 'bg-tea border-tea' : 'border-warmgray'
                }`}></span>
                <span className="text-bark">{item.text}</span>
              </li>
            ))}
          </ul>
        </Card>
      ))}

      {/* 今日摘要 */}
      {data?.summary && (
        <Card title="今日對話摘要" icon="📋">
          <pre className="text-sm text-bark whitespace-pre-wrap leading-relaxed max-h-64 overflow-y-auto">
            {data.summary}
          </pre>
        </Card>
      )}
    </div>
  );
}

// ── 行程頁籤 ───────────────────────────────────────

function ScheduleTab({ data, onRefresh }) {
  const [time, setTime] = useState('');
  const [title, setTitle] = useState('');
  const schedule = data?.schedule || [];

  const addSchedule = async () => {
    if (!title.trim()) return;
    await fetch('/api/schedule', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ time, title })
    });
    setTime('');
    setTitle('');
    onRefresh();
  };

  const togglePrepared = async (id) => {
    await fetch('/api/schedule/toggle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id })
    });
    onRefresh();
  };

  const deleteSchedule = async (id) => {
    await fetch('/api/schedule/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id })
    });
    onRefresh();
  };

  return (
    <div className="space-y-6 fade-in">
      <Card title="今日行程" icon="📅">
        {/* 新增行程 */}
        <div className="flex gap-2 mb-5">
          <input
            type="time"
            value={time}
            onChange={e => setTime(e.target.value)}
            className="w-28 border-2 border-sand rounded-lg px-3 py-2 text-sm bg-paper text-bark"
          />
          <input
            type="text"
            value={title}
            onChange={e => setTitle(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && addSchedule()}
            placeholder="行程名稱…"
            className="flex-1 border-2 border-sand rounded-lg px-3 py-2 text-sm bg-paper text-bark"
          />
          <button
            onClick={addSchedule}
            className="bg-tea text-paper px-4 py-2 rounded-lg text-sm font-bold hover:bg-bark transition-colors btn-press"
          >
            新增
          </button>
        </div>

        {/* 行程列表 */}
        {schedule.length === 0 ? (
          <p className="text-warmgray text-sm">今天還沒有行程</p>
        ) : (
          <ul className="space-y-2">
            {schedule.map(item => (
              <li key={item.id}
                className={`flex items-center gap-3 p-3 rounded-lg border-2 transition-all ${
                  item.prepared
                    ? 'bg-earth/10 border-earth/30'
                    : 'bg-paper border-sand'
                }`}
              >
                <button
                  onClick={() => togglePrepared(item.id)}
                  className={`w-6 h-6 rounded-full border-2 shrink-0 flex items-center justify-center transition-colors btn-press ${
                    item.prepared
                      ? 'bg-earth border-earth text-white'
                      : 'border-warmgray hover:border-tea'
                  }`}
                >
                  {item.prepared && '✓'}
                </button>
                <span className="text-xs font-bold text-tea w-14 shrink-0">
                  {item.time || '--:--'}
                </span>
                <span className={`text-sm flex-1 ${item.prepared ? 'text-earth font-bold' : 'text-bark'}`}>
                  {item.title}
                </span>
                <button
                  onClick={() => deleteSchedule(item.id)}
                  className="text-warmgray hover:text-red-400 text-xs btn-press"
                >
                  刪除
                </button>
              </li>
            ))}
          </ul>
        )}
      </Card>
    </div>
  );
}

// ── 小記頁籤 ───────────────────────────────────────

function NotesTab({ data, onRefresh }) {
  const [inspiration, setInspiration] = useState(data?.notes?.inspiration || '');
  const [todos, setTodos] = useState(data?.notes?.todos || '');
  const [saved, setSaved] = useState(false);
  const saveTimer = useRef(null);

  const autoSave = useCallback((insp, td) => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      await fetch('/api/daily-notes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ inspiration: insp, todos: td })
      });
      setSaved(true);
      setTimeout(() => setSaved(false), 2000);
    }, 1500);
  }, []);

  const handleInspiration = (val) => {
    setInspiration(val);
    autoSave(val, todos);
  };

  const handleTodos = (val) => {
    setTodos(val);
    autoSave(inspiration, val);
  };

  return (
    <div className="space-y-6 fade-in">
      {saved && (
        <div className="fixed top-4 right-4 bg-earth text-white text-sm font-bold px-4 py-2 rounded-lg shadow-lg fade-in z-50">
          已自動儲存
        </div>
      )}

      <Card title="靈感筆記" icon="💡">
        <p className="text-xs text-warmgray mb-2">
          記下你的靈感，每天 23:59 會自動存入對話摘要資料夾。
        </p>
        <textarea
          value={inspiration}
          onChange={e => handleInspiration(e.target.value)}
          rows={6}
          placeholder="今天有什麼靈感？"
          className="w-full border-2 border-sand rounded-lg p-3 text-sm bg-paper text-bark resize-none"
        />
      </Card>

      <Card title="待辦速記" icon="✏️">
        <p className="text-xs text-warmgray mb-2">
          每行一筆，23:59 會自動寫入玩家待辦任務（支線任務區）。
        </p>
        <textarea
          value={todos}
          onChange={e => handleTodos(e.target.value)}
          rows={6}
          placeholder="一行一筆待辦事項…"
          className="w-full border-2 border-sand rounded-lg p-3 text-sm bg-paper text-bark resize-none"
        />
      </Card>

      {/* 手動快速記錄 */}
      <Card title="快速記錄" icon="📌">
        <QuickNote onRefresh={onRefresh} />
        <div className="mt-3 space-y-2">
          {(data?.manualNotes || []).map((n, i) => (
            <div key={i} className="flex gap-3 text-sm border-b border-sand/50 pb-2">
              <span className="text-warmgray text-xs shrink-0 mt-0.5">{n.time}</span>
              <span className="text-bark">{n.text}</span>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

// ── 共用元件 ───────────────────────────────────────

function Card({ title, icon, children }) {
  return (
    <div className="bg-paper rounded-xl border-2 border-sand card-shadow overflow-hidden">
      <div className="px-5 py-3 border-b-2 border-sand bg-milk/20">
        <h2 className="text-sm font-black text-bark">
          {icon && <span className="mr-1.5">{icon}</span>}
          {title}
        </h2>
      </div>
      <div className="p-5">{children}</div>
    </div>
  );
}

function QuickNote({ onRefresh }) {
  const [note, setNote] = useState('');

  const addNote = async () => {
    if (!note.trim()) return;
    await fetch('/api/note', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ note })
    });
    setNote('');
    onRefresh();
  };

  return (
    <div className="flex gap-2">
      <input
        type="text"
        value={note}
        onChange={e => setNote(e.target.value)}
        onKeyDown={e => e.key === 'Enter' && addNote()}
        placeholder="隨手記一筆…"
        className="flex-1 border-2 border-sand rounded-lg px-3 py-2 text-sm bg-paper text-bark"
      />
      <button
        onClick={addNote}
        className="bg-tea text-paper px-4 py-2 rounded-lg text-sm font-bold hover:bg-bark transition-colors btn-press"
      >
        記錄
      </button>
    </div>
  );
}

function ImportBanner({ dailyData, onRefresh }) {
  const [show, setShow] = useState(true);

  if (!show) return null;

  const doImport = async () => {
    await fetch('/api/import', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(dailyData)
    });
    setShow(false);
    onRefresh();
  };

  return (
    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-bark text-paper px-6 py-3 rounded-xl shadow-xl flex items-center gap-4 z-50 fade-in">
      <span className="text-sm font-bold">偵測到 daily-data.json，要匯入嗎？</span>
      <button
        onClick={doImport}
        className="bg-earth text-white px-4 py-1.5 rounded-lg text-sm font-bold hover:bg-green-700 btn-press"
      >
        匯入
      </button>
      <button
        onClick={() => setShow(false)}
        className="text-warmgray hover:text-white text-sm btn-press"
      >
        略過
      </button>
    </div>
  );
}

// ── 渲染 ─────────────────────────────────────────

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
