<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>嘜頭資料產生器 v2</title>
<style>
* { box-sizing: border-box; }
body { font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif; max-width: 820px; margin: 0 auto; padding: 16px; background: #eef2f7; color: #1a2c3a; font-size: 16px; }
h1 { color: #1a3a5c; font-size: 20px; border-bottom: 2px solid #2980b9; padding-bottom: 8px; margin-bottom: 16px; }
h2 { color: #1a3a5c; font-size: 14px; margin: 0 0 10px; letter-spacing: .03em; }
.card { background: white; border-radius: 8px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.field { display: flex; flex-direction: column; gap: 3px; }
.field label { font-size: 12px; color: #666; font-weight: bold; }
.field input, .field select { padding: 8px 10px; border: 1.5px solid #ccc; border-radius: 6px; font-size: 15px; font-family: inherit; transition: border-color .2s; }
.field input:focus, .field select:focus { outline: none; border-color: #2980b9; }
select.big { font-size: 15px; padding: 10px 12px; border: 1.5px solid #2980b9; border-radius: 6px; width: 100%; font-family: inherit; background: #f8fbff; cursor: pointer; }
select.big:focus { outline: none; }
.seq-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
.seq-btn { padding: 6px 14px; border: 1.5px solid #bbb; border-radius: 20px; background: white; cursor: pointer; font-size: 13px; font-family: inherit; color: #555; transition: all .15s; }
.seq-btn.active { border-color: #2980b9; background: #2980b9; color: white; font-weight: bold; }
.seq-inline { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.preview-box {
  border: 2px solid #aaa;
  padding: 16px 20px;
  font-family: 'Times New Roman', serif;
  font-size: 22px;
  line-height: 1.9;
  background: white;
  min-height: 60px;
  white-space: pre-line;
}
.preview-fixed { color: #222; }
.preview-var { color: #c0392b; font-weight: bold; }
.preview-num { color: #7d4e00; font-weight: bold; background: #fef9c3; padding: 0 3px; border-radius: 2px; }
.btn { padding: 10px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: inherit; margin: 3px; font-weight: bold; }
.btn-primary { background: #2980b9; color: white; font-size: 16px; padding: 12px 32px; }
.btn-primary:hover { background: #2471a3; }
.btn-gray { background: #95a5a6; color: white; }
.summary-box { background: #eaf4fb; border-left: 4px solid #2980b9; padding: 10px 14px; margin-bottom: 12px; border-radius: 0 4px 4px 0; font-size: 14px; }
.note { font-size: 12px; color: #888; margin-top: 6px; }
.result-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
#dynamicFields:empty::before { content: '← 請先選擇客戶模板'; color: #aaa; font-size: 14px; display: block; padding: 8px 0; }
</style>
</head>
<body>

<h1>🏷️ 嘜頭資料產生器 <small style="font-size:13px;color:#aaa;font-weight:normal">v2</small></h1>

    </optgroup>

</div>

<!-- STEP 2: Fields -->
<div class="card" id="fieldsCard" style="display:none">
  <h2>② 填寫訂單資訊</h2>
  <div id="dynamicFields" class="grid"></div>
</div>

<!-- STEP 3: Sequence -->
<div class="card" id="seqCard" style="display:none">
  <h2>③ 序號設定</h2>
  <div class="seq-row">
    <button class="seq-btn active" id="seqMode1" onclick="setSeqMode(1)">從 1 開始</button>
    <button class="seq-btn" id="seqMode2" onclick="setSeqMode(2)">令序（每令 2000）</button>
    <button class="seq-btn" id="seqMode3" onclick="setSeqMode(3)">自訂起始號</button>
  </div>
  <div class="seq-inline" id="seqInputs">
    <div class="field">
      <label>總數量（張）</label>
      <input type="number" id="seqTotal" placeholder="例：2000" min="1" max="99999" oninput="updatePreview()">
    </div>
  </div>
</div>

<!-- STEP 4: Preview -->
<div class="card" id="previewCard" style="display:none">
  <h2>④ 嘜頭預覽</h2>
  <div class="preview-box" id="labelPreview"></div>
  <p class="note">實際列印：A4 橫向，字體 28pt，一頁一張</p>
</div>

<!-- STEP 5: Print -->
<div class="card" id="printCard" style="display:none">
  <h2>⑤ 列印</h2>
  <div class="summary-box" id="summaryBox">請完成上方設定</div>
  <div class="result-row">
    <button class="btn btn-primary" onclick="printLabels()">🖨️ 產生並列印</button>
    <button class="btn btn-gray" onclick="clearAll()">清除</button>
  </div>
  <p class="note" style="margin-top:10px">開啟列印預覽視窗後直接印出</p>

    render(d,n){ return [
      v(d,'ref'),
      'NO .'+n,
      'MADE IN TAIWAN',
    ]},
  },

  'tlb-e293': {
    fields: [
      { id:'ref', label:'TLB Ref（含日期碼）', ph:'TLB36-2601140001' },
    ],
    render(d,n){ return [
      v(d,'ref'),
      'NO .'+n,
      'MADE IN TAIWAN',
    ]},
  },
};

// ─────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────
let currentTpl = null;
let seqMode = 1; // 1=from1, 2=ream, 3=custom

// Helper: get value from dynamic field, or placeholder stub
function v(d, id) {
  const val = d[id];
  return (val && val.trim()) ? val.trim() : ('——');
}

// ─────────────────────────────────────────────────────────────
function selectTemplate() {
  const key = document.getElementById('templateSelect').value;
  currentTpl = key ? TEMPLATES[key] : null;

  const fc = document.getElementById('fieldsCard');
  const sc = document.getElementById('seqCard');
  const pc = document.getElementById('previewCard');
  const prc = document.getElementById('printCard');

  if (!currentTpl) {
    fc.style.display = sc.style.display = pc.style.display = prc.style.display = 'none';
    return;
  }

  // Render fields
  const container = document.getElementById('dynamicFields');
  container.innerHTML = '';

  // Choose grid class based on field count
  const flds = currentTpl.fields;
  const cls = flds.length >= 3 ? 'grid' : (flds.length === 2 ? 'grid' : '');
  if (cls) container.className = cls;

  if (flds.length === 0) {
    container.innerHTML = '<p style="color:#888;font-size:14px;margin:0">此模板無需填寫訂單資訊，直接設定序號即可。</p>';
    fc.style.display = 'block';
  } else {
    flds.forEach(f => {
      const div = document.createElement('div');
      div.className = 'field';
      div.innerHTML = `<label>${f.label}</label><input type="text" id="f_${f.id}" placeholder="${f.ph}" oninput="updatePreview()">`;
      container.appendChild(div);
    });
    fc.style.display = 'block';
  }

  sc.style.display = pc.style.display = prc.style.display = 'block';
  setSeqMode(1, true); // reset mode without re-rendering seq buttons
  updatePreview();
}

function setSeqMode(mode, silent) {
  seqMode = mode;
  [1,2,3].forEach(m => {
    const b = document.getElementById('seqMode'+m);
    if(b) b.classList.toggle('active', m===mode);
  });
  const inp = document.getElementById('seqInputs');
  if (mode === 1) {
    inp.innerHTML = `
      <div class="field">
        <label>總數量（張）</label>
        <input type="number" id="seqTotal" placeholder="例：2000" min="1" max="99999" oninput="updatePreview()">
      </div>`;
  } else if (mode === 2) {
    inp.innerHTML = `
      <div class="field">
        <label>令序</label>
        <select id="seqRealm" onchange="updatePreview()" style="padding:8px 10px;border:1.5px solid #ccc;border-radius:6px;font-size:15px;font-family:inherit">
          <option value="1">第一令（1 ～ 2,000）</option>
          <option value="2">第二令（2,001 ～ 4,000）</option>
          <option value="3">第三令（4,001 ～ 6,000）</option>
          <option value="4">第四令（6,001 ～ 8,000）</option>
          <option value="5">第五令（8,001 ～ 10,000）</option>
        </select>
      </div>`;
  } else {
    inp.innerHTML = `
      <div class="field">
        <label>起始號碼</label>
        <input type="number" id="seqStart" placeholder="例：4001" min="1" oninput="updatePreview()">
      </div>
      <div class="field">
        <label>結束號碼</label>
        <input type="number" id="seqEnd" placeholder="例：6000" min="1" oninput="updatePreview()">
      </div>`;
  }
  if (!silent) updatePreview();
}

function getSeqRange() {
  if (seqMode === 1) {
    const t = parseInt(document.getElementById('seqTotal')?.value);
    return isNaN(t) || t < 1 ? null : { start: 1, end: t };
  } else if (seqMode === 2) {
    const r = parseInt(document.getElementById('seqRealm')?.value || 1);
    return { start: (r-1)*2000+1, end: r*2000 };
  } else {
    const s = parseInt(document.getElementById('seqStart')?.value);
    const e = parseInt(document.getElementById('seqEnd')?.value);
    return (!isNaN(s) && !isNaN(e) && e >= s) ? { start: s, end: e } : null;
  }
}

function getFieldData() {
  const d = {};
  if (!currentTpl) return d;
  currentTpl.fields.forEach(f => {
    const el = document.getElementById('f_'+f.id);
    d[f.id] = el ? el.value : '';
  });
  return d;
}

function updatePreview() {
  if (!currentTpl) return;
  const d = getFieldData();
  const range = getSeqRange();
  const n = range ? `<span class="preview-num">${range.start} ～ ${range.end}</span>` : '<span class="preview-num">?</span>';
  const lines = currentTpl.render(d, n);
  document.getElementById('labelPreview').innerHTML = lines.join('\n');

  // Summary
  const total = range ? (range.end - range.start + 1) : 0;
  const box = document.getElementById('summaryBox');
  if (range && total > 0) {
    box.innerHTML = `✅ 準備列印　共 <b>${total.toLocaleString()}</b> 張（NO. ${range.start.toLocaleString()} ～ ${range.end.toLocaleString()}）`;
  } else {
    box.innerHTML = '請完成上方序號設定';
  }
}

function printLabels() {
  if (!currentTpl) return;
  const d = getFieldData();
  const range = getSeqRange();

  if (!range) { alert('請完成序號設定'); return; }
  const total = range.end - range.start + 1;
  if (total > 99999) { alert('數量過大（上限 99,999）'); return; }

  let pages = '';
  for (let i = range.start; i <= range.end; i++) {
    const pb = i < range.end ? 'page-break-after:always;' : '';
    const lines = currentTpl.render(d, i);
    pages += `<div class="page" style="${pb}"><div class="content">${lines.join('<br>')}</div></div>`;
  }

  const win = window.open('', '_blank');
  const tplName = document.getElementById('templateSelect').options[document.getElementById('templateSelect').selectedIndex].text;
  win.document.write(`<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>嘜頭 ${tplName} NO.${range.start}-${range.end}</title>
<style>
@page { size: A4 landscape; margin: 0; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: white; }
.page {
  width: 297mm; height: 210mm;
  display: flex;
  align-items: flex-start;
  padding: 75mm 15mm 10mm 65mm;
}
.content {
  font-family: 'Times New Roman', serif;
  font-size: 28pt;
  line-height: 1.75;
}
</style>
</head><body>${pages}</body></html>`);
  win.document.close();
  win.focus();
  setTimeout(() => win.print(), 500);
}

function clearAll() {
  if (currentTpl) {
    currentTpl.fields.forEach(f => {
      const el = document.getElementById('f_'+f.id);
      if (el) el.value = '';
    });
  }
  const total = document.getElementById('seqTotal');
  if (total) total.value = '';
  const start = document.getElementById('seqStart');
  if (start) start.value = '';
  const end = document.getElementById('seqEnd');
  if (end) end.value = '';
  updatePreview();
}
</script>
</body>
