name: 每日摘要同步到 Notion

on:
  push:
    branches: [main]
    paths:
      - 'F｜行動聚焦漏斗/對話摘要/*.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 同步最新摘要到 Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, json, glob, urllib.request, urllib.error

          files = sorted(glob.glob("F｜行動聚焦漏斗/對話摘要/*.md"))
          if not files:
              print("找不到摘要檔案")
              exit(0)

          latest_file = files[-1]
          filename = os.path.basename(latest_file).replace('.md', '')
          print(f"同步檔案：{filename}")

          with open(latest_file, 'r', encoding='utf-8') as f:
              content = f.read()

          date_part = filename[:6]
          formatted_date = f"20{date_part[:2]}-{date_part[2:4]}-{date_part[4:6]}"

          token = os.environ['NOTION_TOKEN']
          database_id = "3399654af049808ea778d2af00c0b5cd"

          chunks = [content[i:i+2000] for i in range(0, len(content), 2000)]
          children = [
              {
                  "object": "block",
                  "type": "paragraph",
                  "paragraph": {
                      "rich_text": [{"type": "text", "text": {"content": chunk}}]
                  }
              }
              for chunk in chunks
          ]

          payload = {
              "parent": {"database_id": database_id},
              "properties": {
                  "標題": {"title": [{"text": {"content": filename}}]},
                  "日期": {"date": {"start": formatted_date}},
              },
              "children": children
          }

          data = json.dumps(payload).encode('utf-8')
          req = urllib.request.Request(
              "https://api.notion.com/v1/pages",
              data=data,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
                  "Notion-Version": "2026-03-11"
              },
              method="POST"
          )

          try:
              with urllib.request.urlopen(req) as response:
                  result = json.loads(response.read())
                  print(f"✅ 成功同步到 Notion：{result.get('id', '')}")
          except urllib.error.HTTPError as e:
              error_body = e.read().decode()
              print(f"❌ 失敗：{error_body}")
              exit(1)
          EOF
